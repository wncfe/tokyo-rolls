# ==============================================================
# Tokyo Rolls — Docker Compose (MVP)
# Backend: Gunicorn + Django + SQLite
# Frontend: Nginx serves static + proxies API
# ==============================================================

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tokyo-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persistent SQLite database (only data dir, not /app)
      - tokyo-db:/app/data
      # Persistent media files (product images, etc.)
      - tokyo-media:/app/media
      # Static files (collected by entrypoint)
      - tokyo-static:/app/staticfiles
      # Delivery zones GeoJSON (from project root)
      - ./delivery_zones.geojson:/app/delivery_zones.geojson:ro
    networks:
      - app-network
    # Backend accessible only through Nginx (port removed for production)
    # For local dev override, use docker-compose.override.yml with:
    #   ports:
    #     - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "/api"
    container_name: tokyo-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - tokyo-media:/usr/share/nginx/html/media:ro
      - tokyo-static:/usr/share/nginx/html/static:ro
      - ./dashboard/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      target: dev
    container_name: tokyo-dashboard
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3001:3001"
    networks:
      - app-network
    environment:
      - VITE_API_URL=http://tokyo-backend:8000/api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  tokyo-db:
  tokyo-media:
  tokyo-static:

networks:
  app-network:
    driver: bridge
