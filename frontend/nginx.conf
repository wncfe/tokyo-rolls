# ==============================================================
# Tokyo Rolls — Nginx Configuration
# Serves frontend static files, proxies API / Admin / Media to Django
# ==============================================================

server {
    listen 80;
    server_name _;

    # Docker embedded DNS resolver — needed for runtime hostname resolution
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Media files (images) ──
    location /media/ {
        alias /usr/share/nginx/html/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Django Admin ──
    location /admin/ {
        set $backend_upstream "backend:8000";
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API ──
    location /api/ {
        set $backend_upstream "backend:8000";
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeout for long-running requests (e.g., YooKassa)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Frontend static files ──
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
    }
}
